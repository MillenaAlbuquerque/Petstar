<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16"  href="images/favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">

<!-- jQuery (obrigatório para o Slick Carousel) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- CSS do Slick Carousel (escolha um dos estilos) -->
<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css"/>
<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.css"/>

<!-- JavaScript do Slick Carousel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>PetStar</title>
    
</head>
<body>

    <table id="solicitacoesTable">
        <thead>
            <tr>
                <th>Animal</th>
                <th>Nome do Solicitante</th>
                <th>Email do Solicitante</th>
                <th>Condições da Casa</th>
                <th>Outros Animais</th>
                <th>Pessoas na Residência</th>
                <th>Suporte para o Animal</th>
            </tr>
        </thead>
        <tbody>
            <!-- Solicitações serão carregadas aqui -->
        </tbody>
    </table>
    

<script>

$(document).ready(function() {
    function carregarSolicitacoes() {
        $.ajax({
            url: 'versolicitacoesong.php',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                const tbody = $('#solicitacoesTable tbody');
                tbody.empty();
                if (data.success && data.solicitacoes.length > 0) {
                    data.solicitacoes.forEach(function(solicitacao) {
                        const tr = $('<tr>');
                        tr.append('<td>' + solicitacao.nome_animal + '</td>');
                        tr.append('<td>' + solicitacao.nome_usuario + '</td>');
                        tr.append('<td>' + solicitacao.email_usuario + '</td>');
                        tr.append('<td>' + solicitacao.qcasa + '</td>');
                        tr.append('<td>' + solicitacao.qanimais + '</td>');
                        tr.append('<td>' + solicitacao.qpessoas + '</td>');
                        tr.append('<td>' + solicitacao.qsuporte + '</td>');
                        tbody.append(tr);
                    });
                } else {
                    tbody.append('<tr><td colspan="7">Nenhuma solicitação encontrada.</td></tr>');
                }
            },
            error: function(xhr, status, error) {
                console.error(xhr.responseText);
                alert("Erro ao carregar solicitações.");
            }
        });
    }

    // Carregar solicitações ao carregar a página
    carregarSolicitacoes();
});
</script>
</body>
</html>
