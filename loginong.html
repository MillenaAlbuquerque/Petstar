<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Login ONG</title>
    <link rel="stylesheet" href="login.css">
    <style>
        :root {
            --primary-color: #28a745; /* Cor primária */
            --secondary-color: #218838; /* Cor secundária */
            --background-color: #f0f0f0; /* Cor de fundo */
            --text-color: #333; /* Cor do texto */
            --input-border-color: #ccc; /* Cor da borda dos inputs */
            --button-hover-color: #218838; /* Cor do botão ao passar o mouse */
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .login-container {
            background-color: #90d1ae;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: var(--text-color);
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .campo {
            margin-bottom: 15px;
        }
        
        .campo label {
            display: block;
            color: var(--text-color);
            margin-bottom: 5px;
        }
        
        .campo input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border-color);
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        .enviar-btn {
            background-color: #38a269;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        .enviar-btn:hover {
            background-color: var(--button-hover-color);
        }
        
        #mensagem {
            margin-top: 20px;
            color: red;
        }
        
    </style>
</head>
<body>
    <div class="login-container">
        <form id="loginForm" method="POST">
            <h1>Login ONG</h1>
            <div class="input-group">
                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail..." required>
                </div>
                <br/>
                <br/>
                <div class="campo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha..." required>
                </div>
            </div>
            <button class="enviar-btn" type="submit">Entrar</button>
        </form>
        <div id="mensagem"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').submit(function(event) {
                event.preventDefault();
                var formData = {
                    email: $('#email').val(),
                    senha: $('#senha').val()
                };
                $.ajax({
                    url: 'loginong.php', 
                    type: 'POST',
                    data: formData,
                    dataType: 'json',
                    success: function(response) {
                        if (response.success) {
                            window.location.href = 'painelusuarios.php'; // Redirecionar para a página do painel da ONG
                        } else {
                            $('#mensagem').text(response.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error(xhr.responseText);
                        $('#mensagem').text("Ocorreu um erro. Tente novamente mais tarde.");
                    }
                });
            });
        });
    </script>
</body>
</html>
